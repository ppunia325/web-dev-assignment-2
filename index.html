<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Async Weather Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .box {
      background: #3b2b1e;
      padding: 15px;
      border-radius: 10px;
      flex: 1;
    }

    input {
      width: 70%;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 8px 12px;
      border: none;
      background: rgb(47, 8, 205);
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: rgb(25, 215, 40);
    }

    .history button {
      display: block;
      margin: 5px 0;
      width: 100%;
      background: teal;
    }

    .console {
      margin-top: 20px;
      background: #020617;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

  <h1>🌦️ Async Weather Tracker</h1>

  <div class="container">

    <!-- LEFT -->
    <div class="box">
      <h3>Search City</h3>

      <!-- ✅ FORM added (important for submit event) -->
      <form id="form">
        <input type="text" id="cityInput" placeholder="Enter city">
        <button type="submit">Search</button>
      </form>

      <h3>Search History</h3>
      <div id="history" class="history"></div>
    </div>

    <!-- RIGHT -->
    <div class="box">
      <h3>Weather Info</h3>
      <div id="weatherResult">No data</div>
    </div>

  </div>

  <!-- Console -->
  <div class="console">
    <h3>Console - Event Loop</h3>
    <div id="logs"></div>
  </div>

<script>

const apiKey = "1a761d3bb408836cd1af3641ce1604c9"; // ✅ API KEY

const form = document.getElementById("form");
const cityInput = document.getElementById("cityInput");

function log(msg) {
  const logBox = document.getElementById("logs");
  logBox.innerHTML += `<div>${msg}</div>`;
}

async function getWeather(cityParam) {

  document.getElementById("logs").innerHTML = ""; // clear logs

  log("1️⃣ Function Start");

  const city = (cityParam || cityInput.value).trim();

  if (!city) {
    showError("Please enter a city");
    return;
  }

  try {
    log("2️⃣ Before fetch()");

    const response = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`
    );

    log("3️⃣ After fetch() - response received");

    if (!response.ok) {
      throw new Error("City not found");
    }

    const data = await response.json();

    log("4️⃣ Data parsed");

    displayWeather(data);
    saveToHistory(city);

  } catch (error) {
    showError(error.message);
    log("❌ Error: " + error.message);
  }

  log("5️⃣ Function End");
}

function displayWeather(data) {
  const result = document.getElementById("weatherResult");

  result.innerHTML = `
    <p><b>City:</b> ${data.name}</p>
    <p><b>Temperature:</b> ${data.main.temp} °C</p>
    <p><b>Weather:</b> ${data.weather[0].main}</p>
    <p><b>Humidity:</b> ${data.main.humidity}%</p>
    <p><b>Wind:</b> ${data.wind.speed} m/s</p>
  `;
}

function showError(message) {
  document.getElementById("weatherResult").innerHTML =
    `<p class="error">${message}</p>`;
}

function saveToHistory(city) {
  let history = JSON.parse(localStorage.getItem("cities")) || [];

  if (!history.includes(city)) {
    history.unshift(city);
    if (history.length > 5) history.pop();
  }

  localStorage.setItem("cities", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const historyDiv = document.getElementById("history");
  const history = JSON.parse(localStorage.getItem("cities")) || [];

  historyDiv.innerHTML = "";

  history.forEach(city => {
    const btn = document.createElement("button");
    btn.innerText = city;
    btn.onclick = () => getWeather(city);
    historyDiv.appendChild(btn);
  });
}

// ✅ form submit event (important)
form.addEventListener("submit", (event) => {
  event.preventDefault();
  getWeather();
});

// Load history on page load
window.onload = () => {
  renderHistory();
};

</script>

</body>
</html>
